# Message configuration file for ${project.name} v${project.version}

# Time strings
TIME_STRINGS:
  DAY: 'day'
  DAY_PLURAL: 'days'
  HOUR: 'hour'
  HOUR_PLURAL: 'hours'
  MINUTE: 'minute'
  MINUTE_PLURAL: 'minutes'
  SECOND: 'second'
  SECOND_PLURAL: 'seconds'
  UNLIMITED: 'unlimited time'
  LESS_THAN_ONE: 'less than one'


#################################
# Constant Strings
#################################
CONSTANTS:
  TIME:
    UNLIMITED: "unlimited"
    LESS_THAN: "less than {NUMBER}"
    LESS_THAN_ONE: "less than one"


# Variable substitutions:
# {PLAYER}              Message recipient's name
# {PLAYER_IP}           Player ip address
# {DURATION}            a time string, using time denominations specified above

MESSAGES:
  COMMAND_FAIL_ARGS_COUNT_OVER:
    MESSAGE_TEXT: '&cToo many arguments!'
    ENABLED: true

  COMMAND_FAIL_ARGS_COUNT_UNDER:
    MESSAGE_TEXT: '&cToo few arguments!'
    ENABLED: true

  COMMAND_FAIL_PERMISSION_HELP:
    MESSAGE_TEXT: "&cYou do not have permission to view help!"
    ENABLED: true

  COMMAND_FAIL_PERMISSION_RELOAD:
    MESSAGE_TEXT: "&cYou do not have permission to reload the configuration!"
    ENABLED: true

  COMMAND_FAIL_PERMISSION_STATUS:
    MESSAGE_TEXT: '&cYou do not have permission to view plugin settings!'
    ENABLED: true

  COMMAND_FAIL_INVALID:
    MESSAGE_TEXT: '&cThat is not a valid command!'
    ENABLED: true


  COMMAND_SUCCESS_RELOAD:
    MESSAGE_TEXT: '&bconfiguration reloaded.'
    ENABLED: true


  COMMAND_HELP_HELP:
    MESSAGE_TEXT: '&eDisplays help for graveyard commands.'
    ENABLED: true

  COMMAND_HELP_RELOAD:
    MESSAGE_TEXT: '&eReloads the configuration without needing to restart the server.'
    ENABLED: true

  COMMAND_HELP_STATUS:
    MESSAGE_TEXT: '&eDisplays plugin configuration settings.'
    ENABLED: true

  COMMAND_HELP_USAGE_HEADER:
    MESSAGE_TEXT: "&eCommand usage:"
    ENABLED: true

  COMMAND_STATUS_BAN_TIME:
    MESSAGE_TEXT: '&aBan time:&r {DURATION}'
    ENABLED: true

  COMMAND_STATUS_KICK_DELAY:
    MESSAGE_TEXT: '&aKick delay:&r {DURATION}'
    ENABLED: true


  # Message to display on kick
  ACTION_PLAYER_KICK:
    MESSAGE_TEXT: "You've been temp banned!"
    ENABLED: true

  # Message to display on join, before ban has expired
  ACTION_PLAYER_BAN:
    MESSAGE_TEXT: "You're temp banned!"
    ENABLED: true


  LOG_PLAYER_BAN:
    MESSAGE_TEXT: "{PLAYER} was banned on death for {DURATION}."
    ENABLED: true

  LOG_PLAYER_IP_BAN:
    MESSAGE_TEXT: "IP address {PLAYER_IP} for player {PLAYER} was banned on death for {DURATION}."
    ENABLED: true
